#################################
#           Corners             #
#################################

corner-radius = 18;

#################################
#     Backend & Performance     #
#################################

backend = "glx";
vsync = true;
#glx-no-stencil = true;
#glx-no-rebind-pixmap = true;

#################################
#            Shadow             #
#################################

shadow = true;
shadow-radius = 12;
shadow-opacity = 0.40;
shadow-offset-x = -12;
shadow-offset-y = -12;

shadow-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'"
];

#################################
#           Fading              #
#################################

fading = true;
fade-in-step = 0.03;
fade-out-step = 0.03;
fade-delta = 5;
