[colors]
background = #00000000
foreground = #f2f0f5
surface    = #1b1825
overlay    = #5f5872
red        = #f55555
amber      = #f1fa8c

color-date  = #ff79c6
color-bspwm = #4396ff
color-vol   = #50fa7b
color-light = #ffb86c
color-blue  = #4396ff
color-net   = #4bf3ff
color-bat   = #f55555
color-arch  = #1793d1

[bar/bar1]
width = 100%
height = 28pt
radius = 12

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

padding-left = 1
padding-right = 1
module-margin = 0

border-top-size = 12
border-bottom-size = -2
border-left-size = 15
border-right-size = 15
border-color = #00000000

font-0 = "JetBrainsMono Nerd Font:size=9.5;2"
font-1 = "JetBrainsMono Nerd Font:size=20.5;5"
font-2 = "JetBrainsMono Nerd Font:size=13;3"

modules-left = pill-start date pill-end
modules-center = pill-start arch-icon bspwm pill-end
modules-right = pill-start pulseaudio pill-end sep pill-start backlight pill-end sep pill-start bluetooth pill-end sep pill-start network pill-end sep pill-start battery pill-end

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true
wm-restack = bspwm

[module/sep]
type = custom/text
label = " "
label-background = ${colors.background}

[module/pill-start]
type = custom/text
label = ""
label-font = 2
label-foreground = ${colors.surface}
label-background = ${colors.background}

[module/pill-end]
type = custom/text
label = ""
label-font = 2
label-foreground = ${colors.surface}
label-background = ${colors.background}

[module/arch-icon]
type = custom/text
label = "   %{F#5f5872}| "
label-font = 3
label-foreground = ${colors.color-arch}
label-background = ${colors.surface}

[module/date]
type = internal/date
interval = 1
date = %H:%M %%{F#5f5872}│%%{F-} %a, %b %d
label = " %{F#ff79c6} %{F-} %date% "
label-background = ${colors.surface}

[module/bspwm]
type = internal/bspwm
label-background = ${colors.surface}

label-focused = 
label-focused-foreground = ${colors.color-bspwm}
label-focused-background = ${colors.surface}
label-focused-padding = 1

label-occupied = 
label-occupied-foreground = ${colors.color-bspwm}
label-occupied-background = ${colors.surface}
label-occupied-padding = 1

label-empty = 
label-empty-foreground = ${colors.overlay}
label-empty-background = ${colors.surface}
label-empty-padding = 1

label-urgent = 
label-urgent-foreground = ${colors.color-bat}
label-urgent-background = ${colors.surface}
label-urgent-padding = 1

[module/pulseaudio]
type = internal/pulseaudio
format-volume = <label-volume>
label-volume = " %{F#50fa7b} %{F-} %percentage%% "
label-volume-background = ${colors.surface}
format-muted = <label-muted>
label-muted = " %{F#5f5872}󰝟 %{F-} Muted "
label-muted-background = ${colors.surface}
click-right = pavucontrol

[module/backlight]
type = internal/backlight
card = intel_backlight
use-actual-brightness = true
format = <label>
label = " %{F#ffb86c}󰖨 %{F-} %percentage%% "
label-background = ${colors.surface}

[module/bluetooth]
type = custom/script
exec = bluetoothctl show | grep -q "Powered: yes" && echo " %{F#4396ff} %{F-} On " || echo " %{F#5f5872}%{F-} Off "
interval = 5
format-background = ${colors.surface}

[module/network]
type = internal/network
interface = wlan0
interface-type = wireless
interval = 3
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-connected = " %{F#4bf3ff}󰤨 %{F-} %essid% "
label-connected-background = ${colors.surface}
label-disconnected = " %{F#5f5872}󰤮 %{F-} Off "
label-disconnected-background = ${colors.surface}

[module/battery]
type = internal/battery
full-at = 99
low-at = 15
battery = BAT0
adapter = AC0
poll-interval = 5

format-charging = <label-charging>
format-discharging = <label-discharging>
label-charging = " %{F#f1fa8c}󱐋󰁹 %{F-}%percentage%% "
label-charging-background = ${colors.surface}
label-discharging = " %{F#f55555}󰁹 %{F-}%percentage%% "
label-discharging-background = ${colors.surface}
label-full = " %{F#50fa7b}󰁹 %{F-}%percentage%% "
label-full-background = ${colors.surface}
